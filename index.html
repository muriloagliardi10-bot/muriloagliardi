<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CACERES | Streetwear</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <!-- Header / Navbar -->
    <header class="header">
        <div class="logo">
            <h1>CACERES</h1>
        </div>
        <nav class="nav">
            <a href="#catalogo">Coleção</a>
            <a href="#sobre">Sobre</a>
            <a href="admin.html" class="admin-link"><i class="fa-solid fa-lock"></i> Admin</a>
        </nav>
    </header>

    <!-- Banner Principal -->
    <section class="hero">
        <div class="hero-content">
            <h2>RAW STREETWEAR</h2>
            <p>Design minimalista & atitude urbana.</p>
            <a href="#catalogo" class="btn-hero">Ver Produtos</a>
        </div>
    </section>

    <!-- Seção de Produtos (Catálogo Dinâmico) -->
    <section id="catalogo" class="container">
        <h2 class="section-title">Lançamentos</h2>

        <div id="grid-produtos" class="grid-produtos">
            <p class="loading-text">Carregando catálogo...</p>
        </div>
    </section>

    <!-- Chat Widget (IA) -->
    <div class="chat-widget">
        <div id="chat-box" class="chat-box hidden">
            <div class="chat-header">
                <span>Atendimento RAW AI</span>
                <button id="close-chat">&times;</button>
            </div>
            <div id="chat-messages" class="chat-messages">
                <div class="message bot">Olá! Sou o assistente da CACERES. Como posso te ajudar hoje?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Pergunte sobre tamanhos, peças...">
                <button id="send-chat"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
        <button id="toggle-chat" class="chat-btn">
            <i class="fa-solid fa-comments"></i>
        </button>
    </div>

    <!-- Script de Integração com a API do Railway -->
    <script>
        // URL da sua API hospedada no Railway
        const API_URL = 'https://luminous-love-production.up.railway.app/api/produtos';

        // Função para buscar os produtos no Python e desenhar na tela
        async function carregarProdutos() {
            const grid = document.getElementById('grid-produtos');

            try {
                const response = await fetch(`${API_URL}/api/produtos`);

                if (!response.ok) {
                    throw new Error('Erro ao buscar dados do servidor');
                }

                const produtos = await response.json();

                // Limpa o texto de "Carregando..."
                grid.innerHTML = '';

                if (produtos.length === 0) {
                    grid.innerHTML = '<p class="loading-text">Nenhum produto cadastrado no momento.</p>';
                    return;
                }

                // Renderiza cada produto vindo da API
                produtos.forEach(prod => {
                    const card = document.createElement('div');
                    card.classList.add('card-produto');

                    card.innerHTML = `
                        <div class="card-img">
                            <img src="${prod.imagem || 'https://via.placeholder.com/300'}" alt="${prod.nome}">
                        </div>
                        <div class="card-info">
                            <h3>${prod.nome}</h3>
                            <p class="preco">R$ ${parseFloat(prod.preco).toFixed(2).replace('.', ',')}</p>
                            <button class="btn-comprar">Comprar</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Erro ao carregar o catálogo:', error);
                grid.innerHTML = '<p class="loading-text" style="color: #ff4d4d;">Não foi possível carregar os produtos. Verifique se a API no Railway está rodando.</p>';
            }
        }

        // Executa a busca assim que a página carregar
        document.addEventListener('DOMContentLoaded', carregarProdutos);
    </script>

    <!-- Script da IA do Chat -->
    <script src="raw-ai.js"></script>
</body>

</html>
